<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>聽力填空練習 Listening Cloze</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:"Segoe UI",system-ui,sans-serif;background:#f1f5f9;}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── CONFIG ────────────────────────────────────────────────────────
const DEFAULT_DB = ""; // optional fallback Firebase URL
const MODEL = "claude-sonnet-4-20250514";
// No password anywhere in this file. First teacher login sets it.

// ── SHA-256 ───────────────────────────────────────────────────────
async function sha256(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

// ── Firebase REST ─────────────────────────────────────────────────
function getDbUrl() {
  try { return new URLSearchParams(window.location.hash.slice(1)).get("db") || DEFAULT_DB || null; }
  catch { return DEFAULT_DB || null; }
}
function setDbUrlHash(url) { window.location.hash = "db=" + encodeURIComponent(url); }

async function fbGet(url, path) {
  const r = await fetch(`${url}/${path}.json`);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return await r.json();
}
async function fbPut(url, path, data) {
  const r = await fetch(`${url}/${path}.json`, {
    method:"PUT", headers:{"Content-Type":"application/json"}, body:JSON.stringify(data)
  });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
}
async function fbLoad(url) {
  const d = await fbGet(url, "lce");
  return d || { classes:[], exercises:[], logs:[], auth:{} };
}
async function fbSave(url, data) { await fbPut(url, "lce", data); }

// No Claude API needed — translations entered manually by teacher

// ── Helpers ───────────────────────────────────────────────────────
const splitSentences = txt =>
  (txt.replace(/\n+/g," ").match(/[^.!?]+(?:[.!?]+["']?\s*|$)/g)||[txt]).map(s=>s.trim()).filter(Boolean);
const tokenize = str => {
  const tokens=[]; const re=/(\w[\w''-]*|[^\w\s]+)/g; let m;
  while((m=re.exec(str))!==null) tokens.push({val:m[0],isWord:/\w/.test(m[0])});
  return tokens;
};
const normalize = s => s.trim().toLowerCase().replace(/[^\w''-]/g,"");
const B = (bg="#4f46e5",extra={}) => ({padding:"8px 16px",background:bg,color:"#fff",border:"none",borderRadius:6,cursor:"pointer",fontSize:14,...extra});
const CARD = {border:"1px solid #e2e8f0",borderRadius:8,padding:"12px 14px",marginBottom:10};

// ═══════════════════════════════════════════════════════════════════
// SETUP SCREEN
// ═══════════════════════════════════════════════════════════════════
function SetupScreen({onReady}) {
  const [dbInput,setDbInput]=useState(""); const [loading,setLoading]=useState(false);
  const [err,setErr]=useState(""); const [diagLog,setDiagLog]=useState([]);
  const log = msg => setDiagLog(p=>[...p,msg]);

  async function connect() {
    let url = dbInput.trim().replace(/\s+/g,"").replace(/\/+$/,"").split("?")[0].split("#")[0];
    setErr(""); setDiagLog([]);
    if (!url) { setErr("Please enter your Firebase database URL."); return; }
    if (!url.startsWith("https://")) { setErr("URL must start with https://"); return; }
    setLoading(true);
    log(`🔍 Fetching: ${url}/lce.json`);
    let r;
    try { r = await fetch(`${url}/lce.json`); log(`✅ HTTP ${r.status} ${r.statusText}`); }
    catch(e) {
      log(`❌ Network error: ${e.message}`);
      log(`ℹ️  Fix: Firebase Console → Realtime Database → Rules → set read & write to true → Publish`);
      setErr("Failed to reach Firebase. See diagnostics below."); setLoading(false); return;
    }
    if (r.status===401||r.status===403) {
      log(`❌ Permission denied — update Firebase Rules.`);
      setErr(`Permission denied (HTTP ${r.status}).`); setLoading(false); return;
    }
    if (!r.ok) { log(`❌ HTTP ${r.status}`); setErr(`HTTP ${r.status} error.`); setLoading(false); return; }
    let existing;
    try { existing=await r.json(); log(`✅ Response parsed OK`); }
    catch(e) { log(`❌ Invalid JSON: ${e.message}`); setErr("Invalid response."); setLoading(false); return; }
    if (!existing) {
      log(`ℹ️  Empty — initialising…`);
      try { await fbSave(url,{classes:[],exercises:[],logs:[],auth:{}}); log(`✅ Initialised`); }
      catch(e) { log(`❌ Write failed: ${e.message}`); setErr("Read OK but write failed."); setLoading(false); return; }
    } else { log(`✅ Existing data found`); }
    log(`🚀 Launching…`);
    setDbUrlHash(url); onReady(url); setLoading(false);
  }

  const inp={display:"block",width:"100%",padding:"10px 12px",borderRadius:8,border:"1px solid #d1d5db",fontSize:14,marginBottom:8};
  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#eef2ff,#f1f5f9)",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"#fff",borderRadius:16,boxShadow:"0 8px 32px rgba(0,0,0,.1)",padding:36,maxWidth:500,width:"100%"}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:52,marginBottom:8}}>🎧</div>
          <h1 style={{color:"#1e1b4b",fontSize:22,marginBottom:4}}>聽力填空練習</h1>
          <p style={{color:"#6b7280",fontSize:13}}>Listening Cloze Exercise · 連結 Firebase 儲存</p>
        </div>
        <div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:12,padding:16,marginBottom:20,fontSize:13,color:"#1e40af"}}>
          <p style={{fontWeight:"700",marginBottom:10}}>📋 Firebase setup (~3 min, free):</p>
          {[
            <span>Go to <a href="https://console.firebase.google.com" target="_blank" style={{color:"#1d4ed8",fontWeight:600}}>console.firebase.google.com</a> → Create a project</span>,
            <span>Left sidebar → <strong>Build → Realtime Database → Create Database</strong></span>,
            <span>Choose any region → <strong>Start in Test mode</strong></span>,
            <span>Copy the DB URL (looks like <code style={{background:"#dbeafe",padding:"1px 5px",borderRadius:3}}>https://xxx-default-rtdb.firebaseio.com</code>)</span>,
            <span>Paste below and click Connect</span>
          ].map((s,i)=>(
            <div key={i} style={{display:"flex",gap:10,marginBottom:6}}>
              <span style={{fontWeight:"700",color:"#3b82f6",minWidth:18}}>{i+1}.</span><span>{s}</span>
            </div>
          ))}
          <p style={{marginTop:8,fontWeight:600}}>⚠️ If test mode expires: Rules tab → ".read":true, ".write":true → Publish</p>
        </div>
        <input value={dbInput} onChange={e=>{setDbInput(e.target.value);setErr("");}}
          onKeyDown={e=>e.key==="Enter"&&connect()}
          placeholder="https://your-project-default-rtdb.firebaseio.com"
          style={inp}/>
        {err&&<div style={{color:"#dc2626",fontSize:13,marginBottom:8,padding:"8px 10px",background:"#fef2f2",borderRadius:6,border:"1px solid #fca5a5"}}>{err}</div>}
        <button onClick={connect} disabled={loading}
          style={{...B(loading?"#9ca3af":"#4f46e5"),width:"100%",padding:11,fontSize:15,cursor:loading?"not-allowed":"pointer"}}>
          {loading?"⏳ Connecting…":"🔗 Connect & Launch"}
        </button>
        {diagLog.length>0&&(
          <div style={{marginTop:12,background:"#0f172a",borderRadius:8,padding:"10px 14px",fontFamily:"monospace",fontSize:12,lineHeight:1.8}}>
            {diagLog.map((l,i)=>(
              <div key={i} style={{color:l.startsWith("❌")?"#f87171":l.startsWith("✅")||l.startsWith("🚀")?"#86efac":"#94a3b8"}}>{l}</div>
            ))}
          </div>
        )}
        <p style={{fontSize:12,color:"#9ca3af",textAlign:"center",marginTop:10}}>
          Bookmark the URL after connecting and share it with students.
        </p>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// ROOT APP
// ═══════════════════════════════════════════════════════════════════
function App() {
  const [dbUrl,setDbUrlState]=useState(getDbUrl);
  const [db,setDb]=useState(null); const [tab,setTab]=useState("student");
  const [saving,setSaving]=useState(false); const [saveErr,setSaveErr]=useState("");
  const timer=useRef(null);

  useEffect(()=>{
    if(!dbUrl) return;
    fbLoad(dbUrl).then(setDb).catch(e=>setSaveErr("Load error: "+e.message));
  },[dbUrl]);

  const persist=useCallback((newDb)=>{
    if(!dbUrl) return;
    if(timer.current) clearTimeout(timer.current);
    timer.current=setTimeout(async()=>{
      setSaving(true);setSaveErr("");
      try{await fbSave(dbUrl,newDb);}
      catch(e){setSaveErr("⚠️ Save failed: "+e.message);}
      setSaving(false);
    },600);
  },[dbUrl]);

  const updateDb=useCallback((fn)=>{
    setDb(prev=>{const next=fn(prev);persist(next);return next;});
  },[persist]);

  if(!dbUrl) return <SetupScreen onReady={url=>{setDbUrlHash(url);setDbUrlState(url);}}/>;
  if(!db) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#f8fafc"}}>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:48,marginBottom:12}}>⏳</div>
        <p style={{color:"#6b7280"}}>載入中 Loading…</p>
        {saveErr&&<p style={{color:"#dc2626",fontSize:13,marginTop:8}}>{saveErr}</p>}
      </div>
    </div>
  );

  const {classes=[],exercises=[],logs=[],auth={}}=db;
  const updCls=c=>updateDb(d=>({...d,classes:c}));
  const updEx=e=>updateDb(d=>({...d,exercises:e}));
  const addLog=entry=>updateDb(d=>({...d,logs:[entry,...(d.logs||[])]}));
  const updAuth=a=>updateDb(d=>({...d,auth:a}));

  const TABS=[["student","🎓 學生區"],["teacher","👩‍🏫 教師區"],["logs","📊 學習記錄"]];
  return (
    <div style={{maxWidth:780,margin:"0 auto",padding:"16px 14px 48px"}}>
      <div style={{textAlign:"center",marginBottom:18}}>
        <h2 style={{margin:0,color:"#1e1b4b",fontSize:22}}>聽力填空練習</h2>
        <div style={{color:"#6b7280",fontSize:13}}>Listening Cloze Exercise App</div>
        {saving&&<div style={{fontSize:11,color:"#6366f1",marginTop:4}}>💾 儲存中…</div>}
        {saveErr&&<div style={{fontSize:11,color:"#dc2626",marginTop:4}}>{saveErr}</div>}
      </div>
      <div style={{display:"flex",background:"#f1f5f9",borderRadius:8,padding:4,marginBottom:22}}>
        {TABS.map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:"9px 0",border:"none",borderRadius:6,cursor:"pointer",
            background:tab===k?"#4f46e5":"transparent",color:tab===k?"#fff":"#374151",
            fontWeight:tab===k?"700":"400",fontSize:14,transition:"all .15s"}}>{l}</button>
        ))}
      </div>
      {tab==="student"&&<StudentArea classes={classes} exercises={exercises} addLog={addLog}/>}
      {tab==="teacher"&&<TeacherArea classes={classes} updCls={updCls} exercises={exercises} updEx={updEx} auth={auth} updAuth={updAuth}/>}
      {tab==="logs"&&<LogsArea logs={logs}/>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// STUDENT AREA
// ═══════════════════════════════════════════════════════════════════
function StudentArea({classes,exercises,addLog}) {
  const [cls,setCls]=useState(""); const [sid,setSid]=useState(""); const [activeEx,setActiveEx]=useState(null);
  const available=exercises.filter(e=>e.available);
  if(activeEx) return (
    <ExercisePlayer exercise={activeEx}
      onFinish={score=>{
        if(sid.trim()) addLog({classId:cls||"—",studentId:sid.trim(),exerciseName:activeEx.name,
          timestamp:new Date().toLocaleString("zh-TW",{hour12:false}),score});
        setActiveEx(null);
      }}
      onBack={()=>setActiveEx(null)}/>
  );
  return (
    <div>
      <div style={{...CARD,background:"#f8fafc"}}>
        <div style={{fontWeight:"600",marginBottom:10,color:"#374151"}}>學生身份 Student Identity</div>
        <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:140}}>
            <label style={{fontSize:12,color:"#6b7280"}}>班級 Class（選填）</label>
            <select value={cls} onChange={e=>setCls(e.target.value)} style={{display:"block",width:"100%",marginTop:4,padding:"7px 10px",borderRadius:6,border:"1px solid #d1d5db",fontSize:14}}>
              <option value="">— 選擇班級 —</option>
              {classes.map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
          <div style={{flex:1,minWidth:140}}>
            <label style={{fontSize:12,color:"#6b7280"}}>學號 Student ID（選填）</label>
            <input value={sid} onChange={e=>setSid(e.target.value)} placeholder="e.g. B11234567"
              style={{display:"block",width:"100%",marginTop:4,padding:"7px 10px",borderRadius:6,border:"1px solid #d1d5db",fontSize:14}}/>
          </div>
        </div>
        {!sid.trim()&&<div style={{fontSize:12,color:"#f59e0b",marginTop:8}}>⚠️ 未輸入學號時，完成記錄不會儲存。</div>}
      </div>
      <div style={{fontWeight:"600",color:"#374151",marginBottom:10}}>可用練習 Available Exercises</div>
      {available.length===0
        ?<div style={{textAlign:"center",padding:30,color:"#9ca3af",border:"2px dashed #e5e7eb",borderRadius:8}}>暫無可用練習。No exercises available yet.</div>
        :available.map(ex=>(
          <div key={ex.id} style={{...CARD,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontWeight:"600",color:"#1e1b4b"}}>{ex.name}</div>
              <div style={{fontSize:12,color:"#6b7280",marginTop:2}}>{ex.sentences.length} 個句子 sentences</div>
            </div>
            <button onClick={()=>setActiveEx(ex)} style={B()}>開始 Start →</button>
          </div>
        ))}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// EXERCISE PLAYER
// ═══════════════════════════════════════════════════════════════════
function ExercisePlayer({exercise,onFinish,onBack}) {
  const [idx,setIdx]=useState(0); const [inputs,setInputs]=useState({});
  const [feedback,setFeedback]=useState(null); const [wrongIdxs,setWrongIdxs]=useState(new Set());
  const [rate,setRate]=useState(1); const correctRef=useRef(0); const inputRefs=useRef({});
  const total=exercise.sentences.length; const sent=exercise.sentences[idx];
  const tokens=tokenize(sent.text); const wordTokens=tokens.filter(t=>t.isWord);

  useEffect(()=>{ setInputs({}); setFeedback(null); setWrongIdxs(new Set()); inputRefs.current={}; },[idx]);
  useEffect(()=>()=>{ if("speechSynthesis" in window) speechSynthesis.cancel(); },[]);
  useEffect(()=>{ const r=inputRefs.current[0]; if(r) r.focus(); },[idx]);

  const speak=()=>{ if(!("speechSynthesis" in window)) return;
    const u=new SpeechSynthesisUtterance(sent.text); u.rate=rate; u.lang="en-US";
    speechSynthesis.cancel(); speechSynthesis.speak(u); };
  const setVal=(wi,val)=>{ setInputs(p=>({...p,[wi]:val})); setFeedback(null);
    setWrongIdxs(p=>{const n=new Set(p);n.delete(wi);return n;}); };
  const handleKey=(e,wi)=>{ if(e.key==="Enter"){e.preventDefault();check();return;}
    if(e.key==="Tab"){e.preventDefault();const r=inputRefs.current[wi+1];if(r)r.focus();} };
  const check=()=>{ const wrong=new Set();
    wordTokens.forEach((tok,wi)=>{if(normalize(inputs[wi]||"")!==normalize(tok.val))wrong.add(wi);});
    if(wrong.size===0){setFeedback("ok");correctRef.current+=1;}
    else{setFeedback("err");setWrongIdxs(wrong);const f=Math.min(...wrong);if(inputRefs.current[f])inputRefs.current[f].focus();} };
  const next=()=>{ if(idx+1>=total) onFinish(`${correctRef.current}/${total}`); else setIdx(i=>i+1); };
  const allFilled=wordTokens.every((_,wi)=>(inputs[wi]||"").trim()!=="");
  const pct=(idx/total)*100;

  let wi=0;
  const rendered=tokens.map((tok,ti)=>{
    if(!tok.isWord) return <span key={ti} style={{fontSize:16,color:"#374151",userSelect:"none"}}>{tok.val}</span>;
    const w=wi++; const cw=Math.max(tok.val.length,3);
    const isWrong=wrongIdxs.has(w),isOk=feedback==="ok";
    let bc="#6366f1",bg="#fff";
    if(isOk){bc="#22c55e";bg="#f0fdf4";} if(isWrong){bc="#ef4444";bg="#fef2f2";}
    return <input key={ti} ref={el=>{inputRefs.current[w]=el;}} value={inputs[w]||""}
      onChange={e=>setVal(w,e.target.value)} onKeyDown={e=>handleKey(e,w)} disabled={feedback==="ok"}
      placeholder={"_".repeat(Math.min(cw,8))}
      style={{width:`${cw*12+20}px`,padding:"4px 6px",border:`2px solid ${bc}`,borderRadius:5,fontSize:15,background:bg,outline:"none",textAlign:"center"}}/>;
  });

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <button onClick={onBack} style={{background:"none",border:"1px solid #d1d5db",borderRadius:6,padding:"6px 12px",cursor:"pointer",fontSize:13}}>← 返回 Back</button>
        <span style={{fontWeight:"600",color:"#4f46e5",fontSize:15}}>{exercise.name}</span>
        <span style={{fontSize:13,color:"#6b7280"}}>✓ {correctRef.current} / {total}</span>
      </div>
      <div style={{background:"#e5e7eb",borderRadius:99,height:7,marginBottom:6}}>
        <div style={{background:"#4f46e5",height:"100%",borderRadius:99,width:`${pct}%`,transition:"width .3s"}}/>
      </div>
      <div style={{textAlign:"center",fontSize:12,color:"#9ca3af",marginBottom:16}}>第 {idx+1} 句，共 {total} 句 · Sentence {idx+1} of {total}</div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
        <button onClick={speak} style={B("#0ea5e9",{padding:"7px 14px"})}>🔊 Play</button>
        <input type="range" min={0.5} max={1.5} step={0.1} value={rate} onChange={e=>setRate(+e.target.value)} style={{flex:1}}/>
        <span style={{fontSize:12,color:"#6b7280",minWidth:32}}>{rate}×</span>
      </div>
      <div style={{...CARD,background:"#f8fafc",padding:"16px 18px"}}>
        <div style={{fontSize:12,color:"#6b7280",marginBottom:10}}>
          聽音檔，填入所有空格。Listen and fill in all blanks. <span style={{color:"#9ca3af"}}>(Enter 確認 · Tab 跳格)</span>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:"6px 4px",alignItems:"center",lineHeight:2.4}}>{rendered}</div>
      </div>
      {feedback==="ok"&&<div style={{background:"#dcfce7",border:"1px solid #86efac",borderRadius:8,padding:"9px 14px",marginBottom:12,color:"#166534",fontWeight:"500"}}>✅ 全部正確！Correct!</div>}
      {feedback==="err"&&<div style={{background:"#fee2e2",border:"1px solid #fca5a5",borderRadius:8,padding:"9px 14px",marginBottom:12,color:"#991b1b"}}>❌ {wrongIdxs.size} 個空格有誤（紅色）。{wrongIdxs.size} blank{wrongIdxs.size>1?"s":""} incorrect.</div>}
      <div style={{display:"flex",gap:10}}>
        {feedback!=="ok"&&<button onClick={check} disabled={!allFilled} style={{...B(allFilled?"#4f46e5":"#9ca3af"),opacity:allFilled?1:.65,cursor:allFilled?"pointer":"not-allowed"}}>✓ 確認 Check</button>}
        {feedback==="ok"&&<button onClick={next} style={B("#22c55e")}>{idx+1>=total?"🏁 完成 Finish":"下一句 Next →"}</button>}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// TEACHER AREA — password hashed with SHA-256, stored in Firebase
// No default password. First login sets it.
// ═══════════════════════════════════════════════════════════════════
function TeacherArea({classes,updCls,exercises,updEx,auth,updAuth}) {
  const [authed,setAuthed]       = useState(false);
  const [pw,setPw]               = useState("");
  const [loginBusy,setLoginBusy] = useState(false);
  const [loginErr,setLoginErr]   = useState("");
  const [section,setSection]     = useState("classes");
  const [changingPw,setChangingPw] = useState(false);
  const [newPw,setNewPw]         = useState("");
  const [newPw2,setNewPw2]       = useState("");
  const [pwMsg,setPwMsg]         = useState("");
  const [newCls,setNewCls]       = useState("");
  const [exName,setExName]       = useState("");
  const [passage,setPassage]     = useState("");
  const [transText,setTransText] = useState("");
  const [preview,setPreview]     = useState(null);
  const [err,setErr]             = useState("");

  const login = async () => {
    if (!pw.trim()) return;
    setLoginBusy(true); setLoginErr("");
    const hash = await sha256(pw);
    const stored = auth?.pwHash || null;
    if (!stored) {
      updAuth({pwHash: hash});
      setAuthed(true); setPw("");
    } else {
      if (hash === stored) { setAuthed(true); setPw(""); }
      else setLoginErr("密碼錯誤 Wrong password.");
    }
    setLoginBusy(false);
  };

  const changePassword = async () => {
    if (!newPw.trim())    { setPwMsg("請輸入新密碼。"); return; }
    if (newPw !== newPw2) { setPwMsg("兩次密碼不一致。Passwords do not match."); return; }
    if (newPw.length < 6) { setPwMsg("密碼至少 6 字元。Min 6 characters."); return; }
    updAuth({pwHash: await sha256(newPw)});
    setNewPw(""); setNewPw2(""); setChangingPw(false); setPwMsg("");
    alert("密碼已更新！Password updated!");
  };

  if (!authed) return (
    <div style={{maxWidth:340,margin:"40px auto",textAlign:"center"}}>
      <div style={{fontSize:44,marginBottom:10}}>🔒</div>
      <h3 style={{margin:"0 0 6px",color:"#374151"}}>教師登入 Teacher Login</h3>
      <p style={{fontSize:12,color:"#9ca3af",marginBottom:16}}>
        首次使用請輸入任意密碼以完成設定。<br/>First use: enter any password to set it.
      </p>
      <input type="password" value={pw} onChange={e=>{setPw(e.target.value);setLoginErr("");}}
        onKeyDown={e=>e.key==="Enter"&&login()} placeholder="Enter password"
        style={{display:"block",width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid #d1d5db",fontSize:14,boxSizing:"border-box",marginBottom:8}}/>
      {loginErr&&<div style={{color:"#dc2626",fontSize:13,marginBottom:8}}>{loginErr}</div>}
      <button onClick={login} disabled={loginBusy}
        style={{...B(loginBusy?"#9ca3af":"#4f46e5"),width:"100%",padding:10,cursor:loginBusy?"not-allowed":"pointer"}}>
        {loginBusy?"⏳ 驗證中…":"登入 Login"}
      </button>
    </div>
  );

  const addCls=()=>{ if(newCls.trim()&&!classes.includes(newCls.trim())){updCls([...classes,newCls.trim()]);setNewCls("");} };
  const process = () => {
    if (!exName.trim() || !passage.trim()) { setErr("請輸入練習名稱和文章。"); return; }
    const sents = splitSentences(passage);
    const transLines = transText.split("\n").map(l => l.trim());
    setPreview(sents.map((s, i) => ({ text: s, translation: transLines[i] || "" })));
    setErr("");
  };
  const saveEx=()=>{ if(!preview) return;
    updEx([...exercises,{id:Date.now().toString(),name:exName.trim(),sentences:preview,available:true}]);
    setExName("");setPassage("");setTransText("");setPreview(null); };
  const toggleEx=id=>updEx(exercises.map(e=>e.id===id?{...e,available:!e.available}:e));
  const deleteEx=id=>updEx(exercises.filter(e=>e.id!==id));
  const updatePrev=(i,f,v)=>{const p=[...preview];p[i]={...p[i],[f]:v};setPreview(p);};

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{display:"flex",gap:8}}>
          {[["classes","🏫 班級管理"],["exercises","📝 練習管理"]].map(([k,l])=>(
            <button key={k} onClick={()=>setSection(k)} style={{padding:"7px 14px",border:"none",borderRadius:6,cursor:"pointer",fontSize:13,
              background:section===k?"#4f46e5":"#e5e7eb",color:section===k?"#fff":"#374151",fontWeight:section===k?"700":"400"}}>{l}</button>
          ))}
        </div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>setChangingPw(v=>!v)}
            style={{padding:"6px 12px",background:"none",border:"1px solid #d1d5db",borderRadius:6,cursor:"pointer",fontSize:12}}>🔑 改密碼</button>
          <button onClick={()=>setAuthed(false)}
            style={{padding:"6px 12px",background:"none",border:"1px solid #d1d5db",borderRadius:6,cursor:"pointer",fontSize:12}}>🚪 登出</button>
        </div>
      </div>

      {changingPw&&(
        <div style={{...CARD,background:"#fefce8",border:"1px solid #fde68a",marginBottom:16}}>
          <div style={{fontWeight:"600",marginBottom:10}}>🔑 更改密碼 Change Password</div>
          <input type="password" value={newPw} onChange={e=>setNewPw(e.target.value)}
            placeholder="新密碼 New password (min 6 chars)"
            style={{display:"block",width:"100%",padding:"8px 10px",borderRadius:6,border:"1px solid #d1d5db",fontSize:14,marginBottom:6,boxSizing:"border-box"}}/>
          <input type="password" value={newPw2} onChange={e=>setNewPw2(e.target.value)}
            placeholder="確認新密碼 Confirm new password"
            style={{display:"block",width:"100%",padding:"8px 10px",borderRadius:6,border:"1px solid #d1d5db",fontSize:14,marginBottom:6,boxSizing:"border-box"}}/>
          {pwMsg&&<div style={{color:"#dc2626",fontSize:13,marginBottom:6}}>{pwMsg}</div>}
          <div style={{display:"flex",gap:8}}>
            <button onClick={changePassword} style={B("#22c55e",{padding:"7px 14px"})}>✓ 確認儲存</button>
            <button onClick={()=>{setChangingPw(false);setNewPw("");setNewPw2("");setPwMsg("");}}
              style={{padding:"7px 14px",background:"none",border:"1px solid #d1d5db",borderRadius:6,cursor:"pointer",fontSize:13}}>取消</button>
          </div>
        </div>
      )}

      {section==="classes"&&(
        <div>
          <div style={{display:"flex",gap:8,marginBottom:14}}>
            <input value={newCls} onChange={e=>setNewCls(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCls()}
              placeholder="新班級名稱 New class name"
              style={{flex:1,padding:"8px 12px",borderRadius:6,border:"1px solid #d1d5db",fontSize:14}}/>
            <button onClick={addCls} style={B()}>+ 新增</button>
          </div>
          {classes.length===0
            ?<div style={{textAlign:"center",padding:20,color:"#9ca3af"}}>尚無班級。No classes yet.</div>
            :classes.map(c=>(
              <div key={c} style={{...CARD,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontWeight:"500"}}>🏫 {c}</span>
                <button onClick={()=>updCls(classes.filter(x=>x!==c))}
                  style={{padding:"5px 10px",background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:6,cursor:"pointer",fontSize:13}}>🗑 刪除</button>
              </div>
            ))}
        </div>
      )}

      {section==="exercises"&&(
        <div>
          <div style={{...CARD,background:"#f8fafc"}}>
            <div style={{fontWeight:"600",marginBottom:10}}>➕ 新增練習 Create New Exercise</div>
            <input value={exName} onChange={e=>setExName(e.target.value)} placeholder="練習名稱 Exercise name"
              style={{display:"block",width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d1d5db",fontSize:14,marginBottom:8,boxSizing:"border-box"}}/>
            <textarea value={passage} onChange={e=>setPassage(e.target.value)} rows={5} placeholder="貼入英文文章 Paste English passage…"
              style={{display:"block",width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d1d5db",fontSize:14,marginBottom:4,resize:"vertical",boxSizing:"border-box"}}/>
            <div style={{fontSize:12,color:"#6b7280",marginBottom:4}}>中文翻譯（每行對應一句）Chinese translations — one line per sentence:</div>
            <textarea value={transText} onChange={e=>setTransText(e.target.value)} rows={5} placeholder={"第一句的中文翻譯\n第二句的中文翻譯\n第三句的中文翻譯…"}
              style={{display:"block",width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #fde68a",background:"#fefce8",fontSize:14,marginBottom:8,resize:"vertical",boxSizing:"border-box",color:"#92400e"}}/>
            <button onClick={process} disabled={!exName.trim()||!passage.trim()}
              style={{...B(!exName.trim()||!passage.trim()?"#9ca3af":"#4f46e5"),cursor:!exName.trim()||!passage.trim()?"not-allowed":"pointer"}}>
              🔍 預覽分句 Preview Sentences
            </button>
            {err&&<div style={{color:"#dc2626",fontSize:13,marginTop:8}}>{err}</div>}
          </div>
          {preview&&(
            <div style={CARD}>
              <div style={{fontWeight:"600",marginBottom:10}}>預覽 — {preview.length} 句 <span style={{fontSize:12,color:"#6b7280",fontWeight:"400"}}>(翻譯可編輯)</span></div>
              {preview.map((s,i)=>(
                <div key={i} style={{marginBottom:8,padding:"8px 12px",background:"#f8fafc",borderRadius:6,border:"1px solid #e2e8f0"}}>
                  <div style={{fontSize:14,marginBottom:5}}><strong>{i+1}.</strong> {s.text}</div>
                  <input value={s.translation} onChange={e=>updatePrev(i,"translation",e.target.value)}
                    style={{width:"100%",padding:"5px 9px",borderRadius:5,border:"1px solid #fde68a",background:"#fefce8",fontSize:13,color:"#92400e",boxSizing:"border-box"}}/>
                </div>
              ))}
              <button onClick={saveEx} style={{...B("#22c55e"),marginTop:6}}>💾 儲存 Save</button>
            </div>
          )}
          {exercises.length>0&&(
            <div style={{marginTop:16}}>
              <div style={{fontWeight:"600",marginBottom:10}}>現有練習 Existing Exercises</div>
              {exercises.map(ex=>(
                <div key={ex.id} style={{...CARD,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
                  <div><div style={{fontWeight:"500"}}>{ex.name}</div><div style={{fontSize:12,color:"#6b7280"}}>{ex.sentences.length} 個句子</div></div>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <button onClick={()=>toggleEx(ex.id)} style={{padding:"5px 12px",border:"none",borderRadius:6,cursor:"pointer",fontSize:13,
                      background:ex.available?"#dcfce7":"#f3f4f6",color:ex.available?"#166534":"#6b7280",fontWeight:"500"}}>
                      {ex.available?"✅ 開放":"⬜ 關閉"}</button>
                    <button onClick={()=>deleteEx(ex.id)} style={{padding:"5px 10px",background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:6,cursor:"pointer",fontSize:13}}>🗑 刪除</button>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// LEARNING LOGS
// ═══════════════════════════════════════════════════════════════════
function LogsArea({logs}) {
  const [col,setCol]=useState("timestamp"); const [asc,setAsc]=useState(false);
  const COLS=[{k:"classId",l:"班級"},{k:"studentId",l:"學號"},{k:"exerciseName",l:"練習"},{k:"timestamp",l:"時間"},{k:"score",l:"分數"}];
  const sorted=[...logs].sort((a,b)=>{ const av=a[col]||"",bv=b[col]||""; return asc?av.localeCompare(bv):bv.localeCompare(av); });
  const toggleSort=k=>{ if(col===k)setAsc(a=>!a); else{setCol(k);setAsc(true);} };
  return (
    <div>
      <div style={{fontWeight:"600",marginBottom:12}}>學習記錄 Learning Logs <span style={{fontWeight:"400",color:"#6b7280",fontSize:13}}>— {logs.length} 筆</span></div>
      {logs.length===0
        ?<div style={{textAlign:"center",padding:32,color:"#9ca3af",border:"2px dashed #e5e7eb",borderRadius:8}}>尚無記錄。No records yet.</div>
        :<div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:14}}>
            <thead><tr style={{background:"#f1f5f9"}}>
              {COLS.map(c=>(
                <th key={c.k} onClick={()=>toggleSort(c.k)} style={{padding:"9px 12px",textAlign:"left",cursor:"pointer",userSelect:"none",
                  borderBottom:"2px solid #e2e8f0",whiteSpace:"nowrap",color:col===c.k?"#4f46e5":"#374151",fontWeight:"600"}}>
                  {c.l} {col===c.k?(asc?"↑":"↓"):<span style={{color:"#cbd5e1"}}>⇅</span>}
                </th>
              ))}
            </tr></thead>
            <tbody>{sorted.map((log,i)=>(
              <tr key={i} style={{borderBottom:"1px solid #f1f5f9",background:i%2===0?"#fff":"#f9fafb"}}>
                <td style={{padding:"8px 12px"}}>{log.classId}</td>
                <td style={{padding:"8px 12px"}}>{log.studentId}</td>
                <td style={{padding:"8px 12px"}}>{log.exerciseName}</td>
                <td style={{padding:"8px 12px",whiteSpace:"nowrap",fontSize:13}}>{log.timestamp}</td>
                <td style={{padding:"8px 12px",fontWeight:"700",color:"#4f46e5"}}>{log.score}</td>
              </tr>
            ))}</tbody>
          </table>
        </div>
      }
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
